name: Production Release — Execute

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  derive-release-version:
    name: Derive Release Version
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      development_version: ${{ steps.version.outputs.development_version }}
      current_version: ${{ steps.version.outputs.current_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Derive release and next development versions from current Maven version
        id: version
        run: |
          CURRENT_VERSION=$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)
          if [[ "$CURRENT_VERSION" == *-SNAPSHOT ]]; then
            RELEASE_VERSION="${CURRENT_VERSION%-SNAPSHOT}"
          else
            RELEASE_VERSION="$CURRENT_VERSION"
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release version '$RELEASE_VERSION' is not in MAJOR.MINOR.PATCH form; cannot auto-derive next development version."
            exit 1
          fi

          MAJOR="${RELEASE_VERSION%%.*}"
          REST="${RELEASE_VERSION#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"
          NEXT_PATCH=$((PATCH + 1))
          DEVELOPMENT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT"

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "development_version=$DEVELOPMENT_VERSION" >> "$GITHUB_OUTPUT"

          echo "Current Maven version: $CURRENT_VERSION"
          echo "Derived release version: $RELEASE_VERSION"
          echo "Derived next development version: $DEVELOPMENT_VERSION"

  staging-verification:
    name: Staging Verification
    needs: derive-release-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify staging vs live
        uses: github/agentic-workflows@v1
        with:
          workflow: .github/workflows/staging-verification.md
          inputs: |
            release_version=${{ needs.derive-release-version.outputs.release_version }}
            development_version=${{ needs.derive-release-version.outputs.development_version }}

  release:
    name: Maven Release
    needs:
      - derive-release-version
      - staging-verification
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ needs.derive-release-version.outputs.release_version }}
      development_version: ${{ needs.derive-release-version.outputs.development_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        run: git checkout -b "release/${{ needs.derive-release-version.outputs.release_version }}"

      - name: Maven release:prepare
        run: |
          ./mvnw release:prepare -B \
            -DreleaseVersion=${{ needs.derive-release-version.outputs.release_version }} \
            -DdevelopmentVersion=${{ needs.derive-release-version.outputs.development_version }} \
            -Dtag=v${{ needs.derive-release-version.outputs.release_version }} \
            -DpushChanges=false \
            -DlocalCheckout=true

      - name: Maven release:perform
        run: ./mvnw release:perform -B -DlocalCheckout=true

      - name: Push release branch
        run: git push origin "release/${{ needs.derive-release-version.outputs.release_version }}"

  pull-request-to-main:
    name: PR release → main
    needs: release
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.create-pr.outputs.pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: release/${{ needs.release.outputs.release_version }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find previous release tag
        id: prev-tag
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
          fi
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous release: $PREV_TAG"

      - name: Generate AI release summary
        uses: github/agentic-workflows@v1
        with:
          workflow: .github/workflows/generate-release-summary.md
          inputs: |
            release_version=${{ needs.release.outputs.release_version }}
            prev_tag=${{ steps.prev-tag.outputs.tag }}

      - name: Create Pull Request
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build PR body from agent-generated summary
          {
            echo "## Release v${{ needs.release.outputs.release_version }}"
            echo ""
            echo "### Staging verification"
            echo "✅ Staging verification workflow completed successfully."
            echo "See the workflow run logs for detailed checker analysis and approval rationale."
            echo ""
            if [ -f release-summary.md ]; then
              cat release-summary.md
            else
              echo "_Release summary not available._"
            fi
            echo ""
            echo "### Release commits"
            echo "- \`release:prepare\` set version to \`${{ needs.release.outputs.release_version }}\`"
            echo "- \`release:perform\` completed successfully"
            echo "- Next development version: \`${{ needs.release.outputs.development_version }}\`"
            echo ""
            echo "### After merging"
            echo "A follow-up PR to \`production\` and a release tag will be created automatically."
          } > pr-body.md

          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --head "release/${{ needs.release.outputs.release_version }}" \
            --base main \
            --title "Release v${{ needs.release.outputs.release_version }}" \
            --body-file pr-body.md \
            --label "release")

          PR_NUM=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

  notify:
    name: Post summary
    needs:
      - release
      - pull-request-to-main
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Release v${{ needs.release.outputs.release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Staging verification completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Maven release completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ PR #${{ needs.pull-request-to-main.outputs.pr_number }} created to main" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next:** Merge the PR, then production promotion will happen automatically." >> $GITHUB_STEP_SUMMARY





